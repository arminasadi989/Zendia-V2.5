    <script id="vite-hmr-loop-fix">
      // Prevent Vite's client from going into infinite reload loops when websocket fails/disconnects inside iframe
      (function() {
        const OriginalWebSocket = window.WebSocket;
        window.WebSocket = function(url, protocols) {
          if (protocols === 'vite-hmr' || (typeof url === 'string' && url.includes('vite'))) {
            console.log('Intercepted Vite HMR WebSocket connection to prevent infinite reload loops.');
            const dummy = {
              url: url,
              readyState: 1, // OPEN
              send: function() {},
              close: function() {},
              addEventListener: function(event, callback) {
                if (event === 'open') {
                  setTimeout(() => callback({}), 10);
                }
              },
              removeEventListener: function() {},
              dispatchEvent: function() {}
            };
            return dummy;
          }
          return new OriginalWebSocket(url, protocols);
        };
        // Carry over prototype and statics
        window.WebSocket.prototype = OriginalWebSocket.prototype;
        for (let key in OriginalWebSocket) {
          if (OriginalWebSocket.hasOwnProperty(key)) {
            window.WebSocket[key] = OriginalWebSocket[key];
          }
        }
      })();
    </script>
